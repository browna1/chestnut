<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Chestnut's Life</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="shell-bg"></div>

  <header class="topbar">
    <div class="brand">
      <h1>🌰 粟粟的每一天</h1>
      <p>猫咪、生活、旅行的栗子色日记</p>
    </div>
    <div class="auth-area">
      <span id="viewerState">当前：游客</span>
      <div class="auth-buttons">
        <button id="goFeedBtn" class="ghost">动态</button>
        <button id="goTravelBtn" class="ghost">旅行</button>
        <button id="loginBtn">登录</button>
        <button id="logoutBtn" class="ghost" hidden>退出</button>
      </div>
    </div>
  </header>

  <section id="publishSection" class="card" hidden>
    <h2>发布新动态</h2>
    <div class="form-grid">
      <input id="titleInput" placeholder="标题（必填）" />
      <input id="locationInput" placeholder="地点（选填）" />
      <input id="topicInput" placeholder="主题（选填）" />
      <textarea id="contentInput" placeholder="写下今天的故事（选填）..."></textarea>
      <input id="mediaInput" type="file" multiple accept="image/*,video/*" />
      <button id="publishBtn">发布内容</button>
    </div>
    <p class="tip">支持图片和视频。`chestnut` 与管理员可发布与删除全部帖子。</p>
  </section>

  <main id="feedPage">
    <section class="feed-title">
      <h2>最新动态</h2>
      <button id="refreshBtn" class="ghost">刷新</button>
    </section>
    <section id="feed" class="feed"></section>
  </main>

  <section id="travelPage" class="card" hidden>
    <section class="feed-title">
      <h2>旅行地图</h2>
      <button id="travelRefreshBtn" class="ghost">刷新地点</button>
    </section>

    <section id="travelPublishSection" hidden>
      <h3>新增旅行地点</h3>
      <div class="form-grid">
        <input id="travelPlaceInput" placeholder="省份/城市/区县（必填），如：浙江杭州西湖区" />
        <input id="travelCountryInput" placeholder="详细地点（选填），如：西湖断桥" />
        <input id="travelDateInput" type="date" />
        <textarea id="travelNoteInput" placeholder="旅行小记..."></textarea>
        <button id="publishTravelBtn">发布旅行地点</button>
      </div>
    </section>

    <div id="travelMap" class="travel-map"></div>
    <p class="tip">地图支持拖动、双指缩放（手机）和滚轮缩放（电脑）。</p>
    <div id="travelList" class="travel-list"></div>
  </section>

  <dialog id="loginDialog" class="ios-dialog">
    <div class="dialog-shell">
      <h3>欢迎回来</h3>
      <p class="dialog-sub">登录或注册后可管理你的内容</p>
      <input id="usernameInput" placeholder="用户名" />
      <input id="passwordInput" type="password" placeholder="密码" />
      <div class="dialog-actions">
        <button id="confirmLoginBtn">登录</button>
        <button id="registerBtn" class="ghost">注册</button>
      </div>
      <button id="cancelLoginBtn" class="ghost dialog-cancel">取消</button>
      <p class="tip">用户名3-20位（字母/数字/下划线），密码至少7位且含字母+数字。</p>
    </div>
  </dialog>

  <script src="./config.js"></script>
  <script src="https://fastly.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
  <script src="https://fastly.jsdelivr.net/npm/echarts@5/map/js/china.js"></script>
  <script src="./main.js"></script>
</body>
</html>
